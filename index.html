<!DOCTYPE html>

<head>

<style>
  body {
  font-family: Arial;
  margin: 0;
  padding: 0;
  background: #ffffff;
  overflow-x: hidden;
}

  .kanban {
  display: flex;
  gap: 15px;
  padding: 20px;
  overflow-x: auto;
  flex: 1;
  align-items: flex-start;
  min-height: calc(100vh - 80px);
}
  .coluna {
  background: #f1f4f8;
  padding: 12px;
  border-radius: 12px;
  width: 280px;
  min-height: 500px;
  flex-shrink: 0;
  border: 1px solid #e2e8f0;
}
  .header-coluna {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 14px;
  color: #1a1a1a;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 2px solid #e2e8f0;
}

  .card {
  background: #ffffff;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  font-size: 13px;
  cursor: grab;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid #e8edf2;
  font-family: 'Montserrat', sans-serif;
}

.card .editable:first-of-type {
  font-weight: 700;
  font-size: 14px;
  color: #1a1a1a;
  margin-bottom: 4px;
}

.card .editable {
  color: #555;
  font-size: 13px;
  margin-bottom: 2px;
}

  .card:active {
    cursor: grabbing;
  }

  .btn {
    margin-top: 10px;
    background: linear-gradient(90deg, #ff6a00, #ff8c00);
    border: none;
    color: white;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
    font-weight: bold;
  }

.btn-import {
  background: linear-gradient(90deg, #ff6a00, #ff8c00);
  border: none;
  color: white;
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
  box-shadow: 0 4px 12px rgba(255,106,0,0.3);
  transition: 0.2s;
}

.btn-import {
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-import:hover {
  transform: scale(1.05);
}

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    border: none;
    background: #fee2e2;
    color: #dc2626;
    cursor: pointer;
    border-radius: 6px;
    width: 22px;
    height: 22px;
  }

  /* 🔥 EDITÁVEL */
  .editable {
    outline: none;
    border-radius: 6px;
    padding: 2px 4px;
  }

  .editable:focus {
    background: #fff7ed;
  }

#loginBox {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #fff5ee 0%, #fff 50%, #fff5ee 100%);
}

.login-card {
  background: white;
  border-radius: 20px;

  width: 100%;

  box-shadow: 0 8px 40px rgba(255,106,0,0.08);

}

.login-logo {

}

.login-logo img {

  display: block;
}

.login-logo span {

}

.login-logo span {

.login-title {

  margin: 0;
}

.login-field {

}

.login-field label {
  font-size: 14px;

}

.input-wrapper {
  display: flex;

.input-wrapper input {

.login-btn {

.login-btn:hover {

/* SIDEBAR */
.sidebar {

.sidebar-nome {

.sidebar-nav {

.nav-item {

.nav-icon {

.nav-label {

.sidebar.collapsed .nav-label,

.sidebar-footer {

.sidebar-toggle {

/* MAIN CONTENT */
.main-content {
  flex: 1;

  overflow-x: auto;

}

.main-topbar {

.page-title {

.topbar-actions {

.topbar-actions input {

}

.btn-import {
  background: linear-gradient(90deg, #ff6a00, #ff8c00) !important;
  border-radius: 999px !important;
  padding: 8px 16px !important;
}

</style>

<script>

let PIPELINE = "prospeccao";

const SUPABASE_URL = "https://kovyacnxkvxeudaithcg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdnlhY254a3Z4ZXVkYWl0aGNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjY0MjYsImV4cCI6MjA5MjU0MjQyNn0.Ysas7gIh0-kMhWrMgAhDqv18JKNEKQ1-FP99uCqdiK4";

const supabaseClient = supabase.createClient(
  
  SUPABASE_URL,
  SUPABASE_KEY
);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("loginError").innerText = "Email ou senha inválidos";
    console.error(error);
    return;
  }

  iniciarApp(data.user);
}

async function iniciarApp(user) {
  window.currentUser = user;
  PIPELINE = user.user_metadata?.pipeline || "prospeccao";

  // 🔥 LIMPA localStorage pra não misturar usuários
  localStorage.removeItem("crm");
  localStorage.removeItem("columns");
  localStorage.removeItem("messages");

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  console.log("👤 logado:", user.id);

  // 🔥 CARREGA DO BANCO
  await carregarColunas(user.id);
  await carregarLeadsDoSupabase(user.id);

  render();

  setTimeout(() => {
    pegarLeadDaURL();
  }, 300);
}

console.log("🔥 Supabase conectado");

/* =========================
   STATE
========================= */
let columns = [];

let crm = JSON.parse(localStorage.getItem("crm")) || {};
let messages = JSON.parse(localStorage.getItem("messages")) || {};

let leadIndex = {}; // 🔥 NOVO (performance)

/* =========================
   INIT
========================= */

async function carregarLeadsDoSupabase(userId) {
  const { data, error } = await supabaseClient
  .from("leads")
  .select("*")
  .eq("user_id", userId)
  .eq("archived", false);

  if (error) {
    console.error(error);
    return;
  }

  console.log("🔥 leads do banco:", data);

  // 🔥 RESETA CRM
  crm = {};

  // 🔥 recria colunas padrão
  
  columns.forEach(col => {
    crm[col.id] = [];
  });

  // 🔥 distribui leads
  data.forEach(lead => {
    if (!crm[lead.coluna]) {
      crm[lead.coluna] = [];
    }

    crm[lead.coluna].push(lead);
  });
}

columns.forEach(c => {
  if (!crm[c.id]) crm[c.id] = [];
  if (!messages[c.id]) messages[c.id] = "Olá, tudo bem?";
});

window.onload = () => {
  console.log("🔐 aguardando login...");
};

/* =========================
   INDEX (🔥 PERFORMANCE)
========================= */
function rebuildIndex() {
  leadIndex = {};

  columns.forEach(col => {

    if (!crm[col.id]) {
      crm[col.id] = [];
    }

    crm[col.id].forEach(l => {
      leadIndex[l.id] = {
        lead: l,
        colId: col.id
      };
    });

  });
}

function findLead(id) {
  return leadIndex[id] || null;
}

/* =========================
   RENDER
========================= */
function render() {
  const kanban = document.querySelector(".kanban");
  kanban.innerHTML = "";

  columns.forEach(col => {
    const div = document.createElement("div");

    div.className = "coluna";
    div.dataset.id = col.id;

    div.ondragover = allowDropColumn;
    div.ondrop = dropColumn;

    div.innerHTML = `
      <div class="header-coluna">
        ${col.name} (${(crm[col.id] || []).length})
        <div>
          <button onclick="addLead('${col.id}')">+</button>
          <button onclick="editMessage('${col.id}')">✉</button>
          <button onclick="deleteColumn('${col.id}')">🗑</button>
        </div>
      </div>
      <div id="${col.id}"></div>
    `;

    kanban.appendChild(div);
  });

  rebuildIndex(); // 🔥 IMPORTANTE
  renderCards();
}

/* =========================
   CARDS
========================= */
function renderCards() {
  columns.forEach(col => {
    const container = document.getElementById(col.id);
    if (!container) return;

    container.innerHTML = "";

    (crm[col.id] || []).forEach(lead => {
      container.appendChild(createCard(lead));
    });
  });
}

/* =========================
   CARD
========================= */
function createCard(lead) {
  const card = document.createElement("div");

  card.className = "card";
  card.id = lead.id;
  card.draggable = true;

  card.ondragstart = dragCard;

  card.innerHTML = `
    <button class="delete-btn" onclick="deleteCard('${lead.id}')">🗑</button>

    <div contenteditable="true" class="editable"
      oninput="updateLead('${lead.id}','nome',this.innerText)">
      ${lead.nome}
    </div>

    <div contenteditable="true" class="editable"
      oninput="updateLead('${lead.id}','nicho',this.innerText)">
      ${lead.nicho}
    </div>

    <div contenteditable="true" class="editable"
      oninput="updateLead('${lead.id}','telefone',this.innerText)">
      ${lead.telefone}
    </div>

    <div contenteditable="true" class="editable"
      oninput="updateLead('${lead.id}','cidade',this.innerText)">
      ${lead.cidade}
    </div>

    <button class="btn" onclick="whats('${lead.id}')">
      WhatsApp
    </button>
  `;

  return card;
}

/* =========================
   UPDATE
========================= */
const debounceTimers = {};

async function updateLead(id, field, value) {
  const data = findLead(id);
  if (!data) return;

  const newValue = value.trim();
  data.lead[field] = newValue;
  save();

  const key = id + "_" + field;
  clearTimeout(debounceTimers[key]);

  debounceTimers[key] = setTimeout(async () => {
    try {
      await supabaseClient
        .from("leads")
        .update({ [field]: newValue })
        .eq("id", id);
    } catch (e) {
      console.error("Erro ao atualizar:", e);
    }
  }, 600);
}

/* =========================
   DRAG
========================= */
function dragCard(ev) {
  ev.dataTransfer.setData("id", ev.currentTarget.id);
}

async function dropColumn(ev) {
  const id = ev.dataTransfer.getData("id");
  const targetCol = ev.currentTarget.dataset.id;

  const data = findLead(id);
  if (!data) return;

  crm[data.colId] = crm[data.colId].filter(l => l.id !== id);
  crm[targetCol].push(data.lead);

  // 🔥 ATUALIZA NO SUPABASE
  await supabaseClient
    .from("leads")
    .update({ coluna: targetCol })
    .eq("id", id);

  save();
  render();
}

function allowDropColumn(ev) {
  ev.preventDefault();
}

/* =========================
   CRUD
========================= */
async function addLead(colId) {
  if (!crm[colId]) crm[colId] = [];

  console.log("📦 criando lead manual...");

  const { data, error } = await supabaseClient
    .from("leads")
    .insert([{
      nome: "Nome",
      telefone: "5584XXXXXXXX",
      cidade: "Cidade",
      nicho: "Nicho",
      coluna: colId,
      pipeline: PIPELINE,
      user_id: currentUser.id,
      
    }])
    .select();

  if (error) {
    console.error("❌ erro ao criar lead:", error);
    return;
  }

  const lead = {
    id: data[0].id, // 🔥 UUID REAL
    nome: data[0].nome,
    telefone: data[0].telefone,
    cidade: data[0].cidade,
    nicho: data[0].nicho,
    user_id: currentUser.id,
  };

if (!crm[colId]) {
  crm[colId] = [];
}

  crm[colId].push(lead);

save();
rebuildIndex(); // 🔥 ESSA LINHA RESOLVE TUDO
renderCards();

  console.log("🔥 lead manual salvo no supabase");
}

async function deleteCard(id) {

  const found = findLead(id);

  if (!found) return;

  // marca como arquivado no banco
  const { error } = await supabaseClient
    .from("leads")
    .update({
      archived: true
    })
    .eq("id", id);

  if (error) {
    console.error("Erro ao arquivar lead:", error);
    return;
  }

  // remove visualmente
  crm[found.colId] = crm[found.colId].filter(
    l => l.id !== id
  );

  rebuildIndex();
  render();
}

/* =========================
   COLUNAS
========================= */
async function criarColuna() {
  const nome = novaColuna.value.trim();

  if (!nome) return;

  const id = nome.toLowerCase().replace(/\s/g, "_") + "_" + Date.now();

  const novaColunaObj = {
    id,
    name: nome,
    user_id: window.currentUser.id
  };

  const { error } = await supabaseClient
    .from("columns")
    .insert([novaColunaObj]);

  if (error) {
    console.error("Erro ao criar coluna:", error);
    return;
  }

  columns.push({
    id,
    name: nome
  });

  crm[id] = [];

  render();

  console.log("🔥 coluna salva");
}

async function deleteColumn(id) {

  // remove do banco
  const { error } = await supabaseClient
    .from("columns")
    .delete()
    .eq("id", id);

  if (error) {
    console.error("Erro ao deletar coluna:", error);
    return;
  }

  // remove localmente
  columns = columns.filter(c => c.id !== id);

  delete crm[id];
  delete messages[id];

  save();
  render();

}

function editMessage(colId) {
  const nova = prompt("Mensagem:", messages[colId]);
  if (nova !== null) messages[colId] = nova;
  save();
}

/* =========================
   WHATS (🔥 MELHORADO)
========================= */
function whats(id) {
  const data = findLead(id);
  if (!data) return;

  const numero = String(data.lead.telefone).replace(/\D/g, "");
  const msg = encodeURIComponent(messages[data.colId] || "Olá");

  window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

   STORAGE
========================= */
function save() {
  localStorage.setItem("crm", JSON.stringify(crm));
  localStorage.setItem("columns", JSON.stringify(columns));
  localStorage.setItem("messages", JSON.stringify(messages));
}

/* =========================
   CSV
========================= */
async function importarCSV(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    const text = e.target.result;
    const linhas = text.split("\n").filter(l => l.trim() !== "");

    const headers = linhas[0].toLowerCase().split(",");

    const indexNome = headers.findIndex(h => h.includes("nome"));
    const indexTelefone = headers.findIndex(h => h.includes("telefone") || h.includes("phone"));
    const indexCidade = headers.findIndex(h => h.includes("cidade") || h.includes("endereco"));
    const indexNicho = headers.findIndex(h => h.includes("nicho"));

    if (indexNome === -1 || indexTelefone === -1) {
      alert("CSV precisa ter nome e telefone");
      return;
    }

    const colunaInicial = columns[0].id;
    const leads = [];

    for (let i = 1; i < linhas.length; i++) {
      const cols = linhas[i].split(",");

      leads.push({
        nome: cols[indexNome]?.trim() || "Sem nome",
        telefone: cols[indexTelefone]?.trim() || "",
        cidade: indexCidade !== -1 ? cols[indexCidade]?.trim() : "",
        nicho: indexNicho !== -1 ? cols[indexNicho]?.trim() : "",
        coluna: colunaInicial,
        pipeline: PIPELINE,
        user_id: currentUser.id,
      });
    }

    const { data, error } = await supabaseClient
      .from("leads")
      .insert(leads)
      .select();

    if (error) {
      console.error("Erro ao importar:", error);
      alert("Erro ao importar leads");
      return;
    }

    data.forEach(lead => {
      crm[colunaInicial].push(lead);
    });

    rebuildIndex();
    render();

    alert("Leads importados 🚀");
    event.target.value = "";
  };

  reader.readAsText(file);
}
